# App-only Azure Container Instances manifest (no Caddy / no TLS).
# Placeholders like __APP_IMAGE__ are substituted at deploy time by deploy-app-only.ps1.
apiVersion: 2021-10-01
location: __LOCATION__
name: __CONTAINER_GROUP__
properties:
  osType: Linux
  restartPolicy: OnFailure
  ipAddress:
    type: Public
    dnsNameLabel: __DNS_LABEL__
    ports:
      - protocol: tcp
        port: 443
  imageRegistryCredentials:
    - server: __ACR_LOGIN_SERVER__
      username: __ACR_USERNAME__
      password: __ACR_PASSWORD__
  containers:
    - name: app
      properties:
        image: __APP_IMAGE__
        ports:
          - port: 443
            protocol: tcp
        resources:
          requests:
            cpu: 1.0
            memoryInGB: 1.5
        environmentVariables:
          - name: DATA_DIR
            value: /app/data/pricing
          - name: DEFAULT_CURRENCY
            value: __DEFAULT_CURRENCY__
          - name: CACHE_TTL_SECONDS
            value: "__CACHE_TTL_SECONDS__"
type: Microsoft.ContainerInstance/containerGroups
